name: Turbovec Wheel Build

on:
  push:
    branches: [ main ]
    paths:
      - 'turbovec/**'
  pull_request:
    paths:
      - 'turbovec/**'
  workflow_dispatch:

jobs:
  build-wheels:
    name: Build wheels on ${{ matrix.os }} for Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.12']
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Set up Rust (Nightly)
      uses: actions-rs/toolchain@v1
      with:
        toolchain: nightly
        profile: minimal
        override: true
        
    - name: Install Maturin
      run: python -m pip install --upgrade pip maturin
      
    - name: Build Wheel (Windows)
      if: runner.os == 'Windows'
      run: |
        cd turbovec/turbovec-python
        maturin build --release --out target/wheels
        
    - name: Build Wheel (Linux)
      if: runner.os == 'Linux'
      uses: PyO3/maturin-action@v1
      with:
        command: build
        args: --release --out target/wheels -m turbovec/turbovec-python/Cargo.toml
        manylinux: 2014
        rust-toolchain: nightly
        
    - name: Upload Wheel Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: turbovec-wheels-${{ matrix.os }}-py${{ matrix.python-version }}
        path: turbovec/turbovec-python/target/wheels/*.whl
